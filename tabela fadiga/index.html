<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./vnw.svg" type="image/x-icon">
  <title>Análise de Fadiga</title>
  <style>
    /* Estilos para o canvas */
    #canvas {
      border: 2px solid black;
      cursor: crosshair;
    }

    /* Estilos para o div dos pontos */
    #pointsDisplay {
      margin-top: 20px;
      width: 100%;
      text-align: flex-start;
      height: 110px;
    }
  </style>
</head>

<body>
  <img id="sourceImage" src="./fadiga.png" style="display: none;">
  <canvas id="canvas"></canvas>
  <div id="pointsDisplay"></div>

  <div>
    <label for="point1X">Ponto 1: Coordenada X:</label>
    <input type="number" id="point1X" name="point1X">
    <label for="point1Y">Coordenada Y:</label>
    <input type="number" id="point1Y" name="point1Y">
    <br>
    <label for="point2X">Ponto 2: Coordenada X:</label>
    <input type="number" id="point2X" name="point2X">
    <label for="point2Y">Coordenada Y:</label>
    <input type="number" id="point2Y" name="point2Y">
    <br>
    <button id="drawLineBtn">Traçar Reta</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const pointsDisplay = document.getElementById('pointsDisplay');
    const LINE_LENGTH = 800; // comprimento da linha
    let points = [];
    let selectedPoints = 0;

    function drawImageOnCanvas(image) {
      canvas.width = image.width;
      canvas.height = image.height;
      ctx.drawImage(image, 0, 0, image.width, image.height);
    }

    function drawLine(point1, point2) {
      ctx.beginPath();
      ctx.moveTo(point1.x, point1.y);
      ctx.lineTo(point2.x, point2.y);
      ctx.strokeStyle = 'red';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function updatePointsDisplay() {
      pointsDisplay.innerHTML = `
        <p>Ponto 1: (${points[0].x}, ${points[0].y})</p>
        <p>Ponto 2: (${points[1].x}, ${points[1].y})</p>
        <p>Ponto 3: (${points[2].x}, ${points[2].y})</p>
      `;
    }

    function handleCanvasClick(event) {
      const rect = canvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;

      points.push({ x, y });
      selectedPoints++;

      // Desenhar um círculo para cada ponto selecionado
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, 2 * Math.PI);
      ctx.fillStyle = 'blue';
      ctx.fill();

      // Conectar pontos e desenhar linha quando 3 pontos forem selecionados
      if (selectedPoints === 3) {
        drawLine(points[0], points[1]);
        drawLine(points[1], points[2]);
        drawLine(points[2], points[0]);

        // Exibir os pontos capturados no campo de texto
        updatePointsDisplay();

        // Reiniciar o processo após estabelecer os pontos
        points = [];
        selectedPoints = 0;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const image = document.getElementById('sourceImage');
        drawImageOnCanvas(image);
      } else if (selectedPoints === 2) {
        // Calcular a direção do vetor entre os dois pontos
        const deltaX = points[1].x - points[0].x;
        const deltaY = points[1].y - points[0].y;

        // Normalizar o vetor
        const length = Math.sqrt(deltaX ** 2 + deltaY ** 2);
        const normalizedDeltaX = deltaX / length;
        const normalizedDeltaY = deltaY / length;

        // Calcular as coordenadas do terceiro ponto estendendo a linha por 800px
        const x3 = points[1].x + normalizedDeltaX * LINE_LENGTH;
        const y3 = points[1].y + normalizedDeltaY * LINE_LENGTH;

        points.push({ x: x3, y: y3 });

        // Desenhar um círculo para o terceiro ponto
        ctx.beginPath();
        ctx.arc(x3, y3, 5, 0, 2 * Math.PI);
        ctx.fillStyle = 'blue';
        ctx.fill();

        // Conectar pontos e desenhar linha
        drawLine(points[0], points[1]);
        drawLine(points[1], points[2]);
        drawLine(points[2], points[0]);
      }
    }

    function drawLineFromInput() {
      const point1X = parseInt(document.getElementById('point1X').value);
      const point1Y = parseInt(document.getElementById('point1Y').value);
      const point2X = parseInt(document.getElementById('point2X').value);
      const point2Y = parseInt(document.getElementById('point2Y').value);

      points = [{ x: point1X, y: point1Y }, { x: point2X, y: point2Y }];

      // Calcular a direção do vetor entre os dois pontos
      const deltaX = point2X - point1X;
      const deltaY = point2Y - point1Y;

      // Normalizar o vetor
      const length = Math.sqrt(deltaX ** 2 + deltaY ** 2);
      const normalizedDeltaX = deltaX / length;
      const normalizedDeltaY = deltaY / length;

      // Calcular as coordenadas do terceiro ponto estendendo a linha por 800px
      const x3 = point2X + normalizedDeltaX * LINE_LENGTH;
      const y3 = point2Y + normalizedDeltaY * LINE_LENGTH;

      points.push({ x: x3, y: y3 });

      // Desenhar a linha de 800 pixels
      ctx.beginPath();
      ctx.moveTo(point2X, point2Y);
      ctx.lineTo(x3, y3);
      ctx.strokeStyle = 'red'; // cor da linha de 800 pixels
      ctx.lineWidth = 2;
      ctx.stroke();

      // Desenhar a linha principal e atualizar os pontos exibidos
      drawLine(points[0], points[1]);
      updatePointsDisplay();
    }

    // Carregar a imagem ao carregar a página
    window.onload = function () {
      const image = document.getElementById('sourceImage');
      drawImageOnCanvas(image);
    };

    canvas.addEventListener('click', handleCanvasClick);
    document.getElementById('drawLineBtn').addEventListener('click', drawLineFromInput);
  </script>
</body>

</html>
